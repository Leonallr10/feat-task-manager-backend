# docker-compose.yml

version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: task-manager-api
    ports:
      - "3000:3000"
    environment:
      # API reads this in MongoModule (MONGO_URI or COSMOS_MONGO_URI)
      MONGO_URI: mongodb://mongo:27017/task-manager
      JWT_SECRET: super-secret-jwt-key
      NODE_ENV: production
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: task-manager-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: